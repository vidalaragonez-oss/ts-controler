<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TS Controler — Painel do Gestor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    /* ============================
       VARIÁVEIS & RESET
    ============================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #111010;
      --surface: #1a1917;
      --card: #201f1d;
      --border: #2e2c29;
      --amber: #f5a623;
      --amber-dim: #c47f10;
      --amber-glow: rgba(245, 166, 35, .18);
      --amber-soft: rgba(245, 166, 35, .08);
      --text: #e8e2d8;
      --muted: #7a7268;
      --danger: #e05252;
      --success: #52c98a;
      --tag-duda: #3d6bce;
      --tag-diego: #7c3dce;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, .55);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, .4);
      --font-head: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============================
       FUNDO TEXTURA
    ============================ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 60% 40% at 10% 0%, rgba(245, 166, 35, .07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 90% 100%, rgba(245, 166, 35, .05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============================
       HEADER
    ============================ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(17, 16, 16, .85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(16px, 4vw, 48px);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: rgba(245, 166, 35, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(245, 166, 35, 0.15);
      border: 1px solid rgba(245, 166, 35, 0.1);
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 4px;
    }

    .logo span {
      color: var(--amber);
      margin-left: -2px;
    }

    .header-badge {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 99px;
    }

    /* ============================
       LAYOUT PRINCIPAL
    ============================ */
    main {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(24px, 4vw, 40px) clamp(16px, 4vw, 32px);
      display: block;
      /* Mudar para bloco e usar grid interno */
    }

    .client-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    @media (max-width: 768px) {
      .client-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ============================
       SEÇÃO DE TÍTULO
    ============================ */
    .section-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 6px;
    }

    .section-title {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      line-height: 1.15;
      letter-spacing: -.03em;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ============================
       BOTÃO ADICIONAR (NOVO)
    ============================ */
    .btn-add-main {
      background: var(--amber);
      color: #111;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--font-head);
      font-weight: 600;
      font-size: .85rem;
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .2s;
      box-shadow: 0 4px 15px var(--amber-glow);
    }

    .btn-add-main:hover {
      background: #ffc03a;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--amber-glow);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input[type="text"],
    select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: .9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--amber-glow);
    }

    input::placeholder {
      color: var(--muted);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: .85rem;
    }

    .select-wrapper select {
      padding-right: 32px;
    }

    /* Tags Gestor Estratégico */
    .tag-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag-option {
      display: none;
      /* hidden checkbox */
    }

    .tag-label {
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: .8rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      color: var(--muted);
      transition: all .2s;
      user-select: none;
    }

    .tag-option[value="Duda"]:checked+.tag-label {
      background: var(--tag-duda);
      border-color: var(--tag-duda);
      color: #fff;
    }

    .tag-option[value="Diego"]:checked+.tag-label {
      background: var(--tag-diego);
      border-color: var(--tag-diego);
      color: #fff;
    }

    /* Plataformas */
    .platforms-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .platform-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color .2s;
    }

    .platform-item.active {
      border-color: var(--amber);
    }

    .platform-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .platform-check {
      width: 18px;
      height: 18px;
      accent-color: var(--amber);
      cursor: pointer;
      flex-shrink: 0;
    }

    .platform-name {
      font-size: .88rem;
      font-weight: 600;
      flex: 1;
    }

    .platform-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 4px;
    }

    .platform-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .platform-chip-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 2px;
    }

    .platform-chip-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .campaign-input-wrap {
      display: none;
      padding: 0 14px 14px;
      background: rgba(0, 0, 0, 0.1);
      border-top: 1px solid var(--border);
    }

    .campaign-input-wrap.visible {
      display: block;
    }

    .campaign-checklist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      padding-top: 10px;
    }

    .campaign-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .campaign-check-item:hover {
      background: var(--surface);
    }

    .campaign-check-item input {
      width: 15px;
      height: 15px;
      accent-color: var(--amber);
    }

    .campaign-check-item span {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .campaign-check-item.active span {
      color: var(--text);
      font-weight: 500;
    }

    /* Botão primário */
    .btn-primary {
      width: 100%;
      background: var(--amber);
      color: #111;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: .02em;
      padding: 13px 20px;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(245, 166, 35, .3);
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: #ffc03a;
      box-shadow: 0 6px 28px rgba(245, 166, 35, .5);
    }

    .btn-primary:active {
      transform: scale(.98);
    }

    /* ============================
       PAINEL DIREITO — CLIENTES
    ============================ */
    .right-panel {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .stats-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .stat-dot.active {
      background: var(--success);
      box-shadow: 0 0 6px var(--success-glow);
    }

    .stat-dot.none {
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber-glow);
    }

    .stat-dot.cancel {
      background: var(--danger);
      box-shadow: 0 0 6px var(--danger-glow);
    }

    .stat-val {
      color: var(--text);
      padding-left: 2px;
    }

    /* Busca */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .search-wrap input {
      padding-left: 38px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: .88rem;
      width: 100%;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 40px;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus {
      border-color: var(--amber);
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: .85rem;
      pointer-events: none;
    }

    /* Cards de cliente */
    #client-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .client-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn .3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      min-height: 260px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .client-card:hover {
      border-color: rgba(245, 166, 35, .3);
      transform: translateY(-2px);
    }

    /* List View adjustments */
    #client-list.view-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #client-list.view-list .client-card {
      flex-direction: row;
      align-items: center;
      padding: 12px 20px;
      gap: 20px;
      min-height: auto;
    }

    #client-list.view-list .client-card-header {
      margin-bottom: 0;
      flex: 1;
      min-width: 200px;
    }

    #client-list.view-list .platforms-display {
      margin-bottom: 0;
      flex: 2;
      justify-content: flex-start;
    }

    #client-list.view-list .client-actions {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }



    @media (max-width: 1000px) {
      #client-list.view-list .client-card {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* View Switcher Controls */
    .view-switcher {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2px;
    }

    .view-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .view-btn.active {
      background: var(--card);
      color: var(--amber);
      box-shadow: var(--shadow-sm);
    }

    .client-card.inactive-glow {
      border-color: var(--amber);
      box-shadow: 0 0 15px rgba(245, 166, 35, 0.4);
      position: relative;
    }

    .badge-inactive {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--amber);
      background: var(--amber-soft);
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid var(--amber-glow);
      white-space: nowrap;
    }

    .badge-active {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--success);
      background: rgba(82, 201, 138, 0.1);
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid rgba(82, 201, 138, 0.3);
      white-space: nowrap;
    }

    .badge-canceled {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--danger);
      background: rgba(224, 82, 82, 0.1);
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid rgba(224, 82, 82, 0.3);
      white-space: nowrap;
    }

    .client-card.status-inactive {
      border-color: var(--danger);
      box-shadow: 0 0 15px rgba(224, 82, 82, 0.3);
    }

    .client-name-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .client-footer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: auto;
    }

    .footer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .client-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* List View adjustments */
    #client-list.view-list .client-footer {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
      flex-direction: row;
      align-items: center;
      flex: 1;
    }

    .client-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .client-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -.01em;
    }

    .client-meta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 99px;
    }

    .badge-gestor {
      background: var(--amber-soft);
      border: 1px solid rgba(245, 166, 35, .25);
      color: var(--amber);
    }

    .badge-duda {
      background: rgba(61, 107, 206, .18);
      border: 1px solid rgba(61, 107, 206, .3);
      color: #7ea6ff;
    }

    .badge-diego {
      background: rgba(124, 61, 206, .18);
      border: 1px solid rgba(124, 61, 206, .3);
      color: #b888ff;
    }

    /* Plataformas no card */
    .platforms-display {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .platform-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-size: .78rem;
      font-weight: 500;
    }

    .platform-chip-icon {
      font-size: .9rem;
    }

    .platform-chip-name {
      color: var(--muted);
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 700;
    }

    .platform-chip-campaign {
      color: var(--text);
    }

    .chip-sep {
      color: var(--border);
    }

    /* Ações */
    .client-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 4px;
    }

    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: .78rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .2s;
      font-family: var(--font-body);
    }

    .btn-icon:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .btn-icon.edit:hover {
      background: var(--amber-soft);
      border-color: var(--amber);
      color: var(--amber);
    }

    .btn-icon.delete:hover {
      background: rgba(224, 82, 82, .12);
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Estado vazio */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: .4;
    }

    .empty-state-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      opacity: .5;
      margin-bottom: 6px;
    }

    .empty-state-sub {
      font-size: .85rem;
    }

    /* ============================
       MODAL EDIÇÃO
    ============================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: flex-start;
      /* Começa do topo para permitir scroll natural */
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
      /* Scroll na camada de fundo (mais confiável) */
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(20px, 5vw, 32px);
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .7);
      animation: modalIn .25s ease;
      margin-bottom: 40px;
      /* Garante que o final do modal não cole no fundo */
      position: relative;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.95) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-title {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.2rem;
    }

    .modal-close {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1.1rem;
      display: grid;
      place-items: center;
      transition: all .2s;
    }

    .modal-close:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .btn-secondary {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      font-family: var(--font-head);
      font-weight: 600;
      font-size: .9rem;
      padding: 11px;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-secondary:hover {
      border-color: var(--muted);
    }

    .btn-save {
      flex: 2;
      background: var(--amber);
      border: none;
      color: #111;
      border-radius: var(--radius-sm);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: .9rem;
      padding: 11px;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-save:hover {
      background: #ffc03a;
    }

    /* ============================
       TOAST NOTIFICATIONS
    ============================ */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: .85rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      animation: toastIn .3s ease;
      max-width: 280px;
    }

    .toast.error {
      border-left-color: var(--danger);
    }

    .toast.success {
      border-left-color: var(--success);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(30px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ============================
       SCROLLBAR
    ============================ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    /* ============================
       RESPONSIVIDADE
    ============================ */
    /* Manager Management UI */
    .manager-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .manager-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
    }

    .manager-item span {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .btn-del-mini {
      background: rgba(224, 82, 82, 0.1);
      border: 1px solid rgba(224, 82, 82, 0.2);
      color: var(--danger);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.7rem;
    }

    .add-manager-box {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .settings-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    @media (max-width: 600px) {
      .card {
        padding: 20px 16px;
      }

      .client-card {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <img src="Logo PNG.png" alt="TS Controler Logo">
      </div>
      TS <span>Controler</span>
    </div>
    <div class="header-badge">Painel do Gestor</div>
  </header>

  <!-- MAIN LAYOUT -->
  <main>

    <!-- O FORMULÁRIO FOI MOVIDO PARA O MODAL (id="modal-new") -->

    <!-- ===== PAINEL DIREITO ===== -->
    <section class="right-panel">
      <div class="panel-header">
        <div>
          <div class="section-label">Gerenciamento</div>
          <div class="section-title" style="margin-bottom:0">Clientes da Operação</div>
          <div class="stats-group" id="stats-summary">
            <!-- Dinâmico -->
          </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <div class="view-switcher">
            <button class="view-btn active" id="view-grid-btn" onclick="setViewMode('grid')" title="Grade">⊞</button>
            <button class="view-btn" id="view-list-btn" onclick="setViewMode('list')" title="Lista">≡</button>
          </div>
          <button class="settings-btn" onclick="openSettings()" title="Configurações">⚙️</button>
          <button class="btn-add-main" onclick="openModalNew()">➕ Novo Cliente</button>
        </div>
      </div>

      <!-- Filtros -->
      <div style="display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 20px;">
        <div class="search-wrap" style="margin-bottom: 0;">
          <span class="search-icon">🔎</span>
          <input type="text" id="search-input" placeholder="Buscar cliente por nome..." oninput="renderClients()" />
        </div>
        <div class="select-wrapper" style="min-width: 160px;">
          <select id="filter-gestor" onchange="renderClients()">
            <option value="">Gestores: Todos</option>
            <option value="Duda">👤 Duda</option>
            <option value="Diego">👤 Diego</option>
          </select>
        </div>
      </div>

      <!-- Lista -->
      <div id="client-list"></div>
    </section>

  </main>

  <!-- ===== MODAL NOVO CLIENTE ===== -->
  <div class="modal-overlay" id="modal-new-overlay" onclick="closeModalNew(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">✨ Novo Cliente</div>
        <button class="modal-close" onclick="closeModalNew()">✕</button>
      </div>

      <div class="form-group">
        <label for="inp-nome">Nome do Cliente</label>
        <input type="text" id="inp-nome" placeholder="Ex: JAC Cosméticos" />
      </div>

      <div class="form-group">
        <label for="inp-gestor">Gestor de Tráfego</label>
        <div class="select-wrapper">
          <select id="inp-gestor">
            <option value="">Carregando...</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Gestor Estratégico</label>
        <div class="tag-selector" id="inp-gestor-estrat-container">
          <!-- Dinâmico -->
        </div>
      </div>

      <div class="form-group">
        <label>Plataformas & Campanhas</label>
        <div class="platforms-grid">
          <div class="platform-item" id="wrap-meta">
            <div class="platform-header" onclick="togglePlatform('meta')">
              <input type="checkbox" class="platform-check" id="plat-meta" />
              <span class="platform-icon" id="icon-meta"></span>
              <span class="platform-name">Meta Ads</span>
            </div>
            <div class="campaign-input-wrap" id="camp-meta">
              <div class="campaign-checklist" id="camp-meta-list"></div>
            </div>
          </div>
          <div class="platform-item" id="wrap-google">
            <div class="platform-header" onclick="togglePlatform('google')">
              <input type="checkbox" class="platform-check" id="plat-google" />
              <span class="platform-icon" id="icon-google"></span>
              <span class="platform-name">Google Ads</span>
            </div>
            <div class="campaign-input-wrap" id="camp-google">
              <div class="campaign-checklist" id="camp-google-list"></div>
            </div>
          </div>
          <div class="platform-item" id="wrap-gls">
            <div class="platform-header" onclick="togglePlatform('gls')">
              <input type="checkbox" class="platform-check" id="plat-gls" />
              <span class="platform-icon" id="icon-gls"></span>
              <span class="platform-name">Google Local Services</span>
            </div>
            <div class="campaign-input-wrap" id="camp-gls">
              <div class="campaign-checklist" id="camp-gls-list"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModalNew()">Cancelar</button>
        <button class="btn-save" onclick="addClient()">⚡ Cadastrar Cliente</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL EDIÇÃO ===== -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">✏️ Editar Cliente</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <input type="hidden" id="edit-id" />

      <div class="form-group">
        <label for="edit-nome">Nome do Cliente</label>
        <input type="text" id="edit-nome" placeholder="Nome do cliente" />
      </div>

      <div class="form-group">
        <label for="edit-gestor">Gestor de Tráfego</label>
        <div class="select-wrapper">
          <select id="edit-gestor">
            <option value="">Carregando...</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Gestor Estratégico</label>
        <div class="tag-selector" id="edit-gestor-estrat-container">
          <!-- Dinâmico -->
        </div>
      </div>

      <div class="form-group">
        <label>Status do Cliente</label>
        <div class="select-wrapper">
          <select id="edit-status">
            <option value="active">🟢 Ativo</option>
            <option value="inactive">🔴 Inativo (Cancelamento)</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Plataformas & Campanhas</label>
        <div class="platforms-grid" id="edit-platforms-grid">
          <!-- Renderizado via JS -->
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveEdit()">💾 Salvar Alterações</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL CONFIGURAÇÕES ===== -->
  <div class="modal-overlay" id="modal-settings-overlay" onclick="closeSettings(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">⚙️ Gestores</div>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>

      <div class="form-group">
        <label>Gestores de Tráfego</label>
        <div class="manager-list" id="list-gestores-trafego"></div>
        <div class="add-manager-box">
          <input type="text" id="new-gestor-trafego" placeholder="Iniciais (ex: GB)" />
          <button class="btn-save" style="width:auto; padding:0 15px;" onclick="addManager('trafego')">Add</button>
        </div>
      </div>

      <div style="margin-top:30px;" class="form-group">
        <label>Gestores Estratégicos</label>
        <div class="manager-list" id="list-gestores-estrat"></div>
        <div class="add-manager-box">
          <input type="text" id="new-gestor-estrat" placeholder="Nome (ex: Maria)" />
          <button class="btn-save" style="width:auto; padding:0 15px;" onclick="addManager('estrat')">Add</button>
        </div>
      </div>

      <div class="modal-actions" style="margin-top:20px;">
        <button class="btn-primary" onclick="closeSettings()">Concluir</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- ===========================
       JAVASCRIPT
  ============================ -->
  <script>
    /* ---- Chaves do localStorage ---- */
    const STORAGE_KEY = 'ts_analytics_clients';
    const GESTORES_TRAFEGO_KEY = 'ts_gestores_trafego';
    const GESTORES_ESTRAT_KEY = 'ts_gestores_estrat';

    /* ---- Plataformas & Opções Profissionais ---- */
    const LOGOS = {
      meta: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.372-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/></svg>`,
      google: `<svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`,
      gls: `<svg width="20" height="20" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 44C35.0457 44 44 35.0457 44 24C44 12.9543 35.0457 4 24 4C12.9543 4 4 12.9543 4 24C4 35.0457 12.9543 44 24 44Z" fill="#34A853"/><path d="M34.5858 17.5858L21.4142 30.7574L14.8284 24.1716L12 27L21.4142 36.4142L37.4142 20.4142L34.5858 17.5858Z" fill="white"/></svg>`
    };

    const PLATFORMS = [
      {
        key: 'meta',
        label: 'Meta Ads',
        icon: LOGOS.meta,
        options: [
          'Direct Messages (Meta)',
          'Engagement (Meta)',
          'Lead Generation (Meta)',
          'Leads Form (Meta)',
          'WhatsApp Leads',
          'Website Traffic',
          'Sales/Conversion'
        ]
      },
      {
        key: 'google',
        label: 'Google Ads',
        icon: LOGOS.google,
        options: [
          'Search Network (G-Ads)',
          'Performance Max',
          'Display Network',
          'YouTube Ads',
          'App Install'
        ]
      },
      {
        key: 'gls',
        label: 'Google Local Services',
        icon: LOGOS.gls,
        options: [
          'Local Service Ads (GLS)',
          'Local Awareness'
        ]
      },
    ];

    /* ---- Application State ---- */
    const State = {
      clients: [],
      gestoresTrafego: JSON.parse(localStorage.getItem(GESTORES_TRAFEGO_KEY)) || ['DS', 'AV', 'GB'],
      gestoresEstrat: JSON.parse(localStorage.getItem(GESTORES_ESTRAT_KEY)) || ['Duda', 'Diego'],
      currentViewMode: 'grid',
      searchQuery: '',
      filterGestor: ''
    };

    /* ---- Storage Helpers ---- */
    const Storage = {
      load() { State.clients = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; },
      save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(State.clients)); },
      saveManagers() {
        localStorage.setItem(GESTORES_TRAFEGO_KEY, JSON.stringify(State.gestoresTrafego));
        localStorage.setItem(GESTORES_ESTRAT_KEY, JSON.stringify(State.gestoresEstrat));
      }
    };

    /* ---- Manager Logic ---- */
    function addManager(type) {
      const inputId = type === 'trafego' ? 'new-gestor-trafego' : 'new-gestor-estrat';
      const input = document.getElementById(inputId);
      const val = input.value.trim();
      if (!val) return;

      if (type === 'trafego') State.gestoresTrafego.push(val);
      else State.gestoresEstrat.push(val);

      input.value = '';
      Storage.saveManagers();
      syncManagerUI();
      renderManagerSettings();
    }

    function removeManager(type, index) {
      if (type === 'trafego') State.gestoresTrafego.splice(index, 1);
      else State.gestoresEstrat.splice(index, 1);
      Storage.saveManagers();
      syncManagerUI();
      renderManagerSettings();
    }

    function renderManagerSettings() {
      const listT = document.getElementById('list-gestores-trafego');
      const listE = document.getElementById('list-gestores-estrat');

      listT.innerHTML = State.gestoresTrafego.map((g, i) => `
        <div class="manager-item">
          <span>${g}</span>
          <button class="btn-del-mini" onclick="removeManager('trafego', ${i})">Remover</button>
        </div>
      `).join('');

      listE.innerHTML = State.gestoresEstrat.map((g, i) => `
        <div class="manager-item">
          <span>${g}</span>
          <button class="btn-del-mini" onclick="removeManager('estrat', ${i})">Remover</button>
        </div>
      `).join('');
    }

    function syncManagerUI() {
      // 1. Dropdowns de Gestor de Tráfego
      const selects = ['inp-gestor', 'edit-gestor'];
      selects.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const currentVal = el.value;
        el.innerHTML = '<option value="">Selecione...</option>' +
          State.gestoresTrafego.map(g => `<option value="${g}">${g}</option>`).join('');
        el.value = currentVal;
      });

      // 2. Radio buttons de Gestor Estratégico
      const containers = [
        { id: 'inp-gestor-estrat-container', prefix: '', name: 'gestorEstrategico' },
        { id: 'edit-gestor-estrat-container', prefix: 'edit-', name: 'editGestorEstrategico' }
      ];
      containers.forEach(c => {
        const el = document.getElementById(c.id);
        if (!el) return;
        const checkedVal = document.querySelector(`input[name="${c.name}"]:checked`)?.value;
        el.innerHTML = State.gestoresEstrat.map(g => `
          <input type="radio" name="${c.name}" class="tag-option" id="${c.prefix}tag-${g.toLowerCase()}" value="${g}" ${checkedVal === g ? 'checked' : ''} />
          <label class="tag-label" for="${c.prefix}tag-${g.toLowerCase()}">👤 ${g}</label>
        `).join('');
      });

      // 3. Filtro de Gestores no painel principal
      const filterEl = document.getElementById('filter-gestor');
      if (filterEl) {
        const currentF = filterEl.value;
        filterEl.innerHTML = '<option value="">Gestores: Todos</option>' +
          State.gestoresEstrat.map(g => `<option value="${g}">👤 ${g}</option>`).join('');
        filterEl.value = currentF;
      }
    }

    function openSettings() {
      renderManagerSettings();
      document.getElementById('modal-settings-overlay').classList.add('open');
    }
    function closeSettings(e) {
      if (e && e.target !== document.getElementById('modal-settings-overlay')) return;
      document.getElementById('modal-settings-overlay').classList.remove('open');
    }

    /* ---- Utilitário: gera ID único ---- */
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

    /* ---- Client Logic ---- */
    function loadClients() { Storage.load(); return State.clients; }
    function saveClients(list) { State.clients = list; Storage.save(); }

    /* ---- Toggle plataforma (checkbox + campo de campanha) ---- */
    function togglePlatform(key, prefix = '') {
      const checkbox = document.getElementById(`${prefix}plat-${key}`);
      const campWrap = document.getElementById(`${prefix}camp-${key}`);
      const itemWrap = document.getElementById(`${prefix}wrap-${key}`);

      // Se o clique foi no próprio checkbox, não interfira
      if (event && event.target === checkbox) {
        // Deixa o navegador processar naturalmente e só sincroniza visual
        setTimeout(() => syncPlatformUI(key, prefix), 0);
        return;
      }

      // Clique na área do header — toggle o checkbox
      checkbox.checked = !checkbox.checked;
      syncPlatformUI(key, prefix);
    }

    function syncPlatformUI(key, prefix = '') {
      const checkbox = document.getElementById(`${prefix}plat-${key}`);
      const campWrap = document.getElementById(`${prefix}camp-${key}`);
      const itemWrap = document.getElementById(`${prefix}wrap-${key}`);

      if (checkbox.checked) {
        campWrap.classList.add('visible');
        itemWrap.classList.add('active');
      } else {
        campWrap.classList.remove('visible');
        itemWrap.classList.remove('active');
        // Uncheck all campaigns when platform is disabled
        campWrap.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
      }
    }

    /* ---- Coleta dados do formulário principal ---- */
    function collectFormData(prefix = '') {
      const nome = document.getElementById(`${prefix}inp-nome`)?.value.trim()
        || document.getElementById(`edit-nome`)?.value.trim() || '';
      const gestor = document.getElementById(`${prefix}inp-gestor`)?.value
        || document.getElementById(`edit-gestor`)?.value || '';
      const gestorEstrategico = document.querySelector(
        `input[name="${prefix ? 'editGestorEstrategico' : 'gestorEstrategico'}"]:checked`
      )?.value || '';

      const platforms = [];
      PLATFORMS.forEach(p => {
        const cb = document.getElementById(`${prefix}plat-${p.key}`);
        if (cb && cb.checked) {
          const selectedCampaigns = Array.from(
            document.querySelectorAll(`#${prefix}camp-${p.key}-list input:checked`)
          ).map(c => c.value);

          platforms.push({
            key: p.key,
            label: p.label,
            icon: p.icon,
            campaigns: selectedCampaigns
          });
        }
      });

      return { nome, gestor, gestorEstrategico, platforms };
    }

    /* ---- Modais de Cadastro ---- */
    function openModalNew() {
      syncManagerUI();
      resetForm();
      initPlatformUI();
      document.getElementById('modal-new-overlay').classList.add('open');
    }
    function closeModalNew(event) {
      if (event && event.target !== document.getElementById('modal-new-overlay')) return;
      document.getElementById('modal-new-overlay').classList.remove('open');
    }

    function initPlatformUI(prefix = '') {
      PLATFORMS.forEach(p => {
        const iconContainer = document.getElementById(`${prefix}icon-${p.key}`);
        const list = document.getElementById(`${prefix}camp-${p.key}-list`);
        if (iconContainer) iconContainer.innerHTML = p.icon;
        if (list) {
          list.innerHTML = p.options.map(opt => `
            <label class="campaign-check-item">
              <input type="checkbox" value="${opt}">
              <span>${opt}</span>
            </label>
          `).join('');
        }
      });
    }

    /* ---- Adiciona cliente ---- */
    function addClient() {
      const data = collectFormData();

      if (!data.nome) return showToast('Informe o nome do cliente.', 'error');
      if (!data.gestor) return showToast('Selecione o Gestor de Tráfego.', 'error');
      if (!data.gestorEstrategico) return showToast('Selecione o Gestor Estratégico.', 'error');

      const clients = loadClients();
      clients.push({ id: uid(), ...data, createdAt: new Date().toLocaleDateString('pt-BR') });
      saveClients(clients);
      closeModalNew();
      renderClients();
      showToast(`${data.nome} adicionado com sucesso!`, 'success');
    }

    /* ---- Reseta formulário principal ---- */
    function resetForm() {
      document.getElementById('inp-nome').value = '';
      document.getElementById('inp-gestor').value = '';
      document.querySelectorAll('input[name="gestorEstrategico"]').forEach(r => r.checked = false);
      PLATFORMS.forEach(p => {
        const cb = document.getElementById(`plat-${p.key}`);
        if (cb) cb.checked = false;
        syncPlatformUI(p.key);
      });
    }

    /* ---- Exclui cliente ---- */
    function deleteClient(id) {
      if (!confirm('Excluir este cliente?')) return;
      const clients = loadClients().filter(c => c.id !== id);
      saveClients(clients);
      renderClients();
      showToast('Cliente removido.', 'error');
    }

    /* ---- Abre modal de edição ---- */
    function openEdit(id) {
      syncManagerUI();
      const client = loadClients().find(c => c.id === id);
      if (!client) return;

      document.getElementById('edit-id').value = id;
      document.getElementById('edit-nome').value = client.nome;
      document.getElementById('edit-gestor').value = client.gestor;
      document.getElementById('edit-status').value = client.status || 'active';

      const tagRadio = document.querySelector(`input[name="editGestorEstrategico"][value="${client.gestorEstrategico}"]`);
      if (tagRadio) tagRadio.checked = true;

      // Injetar grid de plataformas no modal
      const grid = document.getElementById('edit-platforms-grid');
      grid.innerHTML = PLATFORMS.map(p => `
        <div class="platform-item" id="edit-wrap-${p.key}">
          <div class="platform-header" onclick="togglePlatform('${p.key}', 'edit-')">
            <input type="checkbox" class="platform-check" id="edit-plat-${p.key}" />
            <span class="platform-icon">${p.icon}</span>
            <span class="platform-name">${p.label}</span>
          </div>
          <div class="campaign-input-wrap" id="edit-camp-${p.key}">
            <div class="campaign-checklist" id="edit-camp-${p.key}-list">
              ${p.options.map(o => `
                <label class="campaign-check-item">
                  <input type="checkbox" value="${o}">
                  <span>${o}</span>
                </label>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('');

      // Aplica plataformas salvas
      client.platforms.forEach(pl => {
        const cb = document.getElementById(`edit-plat-${pl.key}`);
        if (cb) {
          cb.checked = true;
          syncPlatformUI(pl.key, 'edit-');

          if (pl.campaigns) {
            pl.campaigns.forEach(camp => {
              const cCheck = document.querySelector(`#edit-camp-${pl.key}-list input[value="${camp}"]`);
              if (cCheck) cCheck.checked = true;
            });
          } else if (pl.campaign) { // Retrocompatibilidade
            const cCheck = document.querySelector(`#edit-camp-${pl.key}-list input[value="${pl.campaign}"]`);
            if (cCheck) cCheck.checked = true;
          }
        }
      });

      document.getElementById('modal-overlay').classList.add('open');
    }

    /* ---- Fecha modal ---- */
    function closeModal(event) {
      if (event && event.target !== document.getElementById('modal-overlay')) return;
      document.getElementById('modal-overlay').classList.remove('open');
    }

    /* ---- Salva edição ---- */
    function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const data = collectFormData('edit-');

      if (!data.nome) return showToast('Informe o nome do cliente.', 'error');
      if (!data.gestor) return showToast('Selecione o Gestor de Tráfego.', 'error');
      if (!data.gestorEstrategico) return showToast('Selecione o Gestor Estratégico.', 'error');

      const status = document.getElementById('edit-status').value;

      State.clients = State.clients.map(c =>
        c.id === id ? { ...c, ...data, status } : c
      );
      Storage.save();
      document.getElementById('modal-overlay').classList.remove('open');
      renderClients();
      showToast('Alterações salvas!', 'success');
    }

    /* ---- View Mode ---- */
    function setViewMode(mode) {
      State.currentViewMode = mode;
      document.getElementById('view-grid-btn').classList.toggle('active', mode === 'grid');
      document.getElementById('view-list-btn').classList.toggle('active', mode === 'list');

      const list = document.getElementById('client-list');
      if (mode === 'list') list.classList.add('view-list');
      else list.classList.remove('view-list');

      renderClients();
    }

    /* ---- Render Client List ---- */
    function renderClients() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const gestorKey = document.getElementById('filter-gestor').value;

      State.searchQuery = query;
      State.filterGestor = gestorKey;

      let filtered = loadClients().filter(c => {
        const matchesQuery = !query || c.nome.toLowerCase().includes(query);
        const matchesGestor = !gestorKey || c.gestorEstrategico === gestorKey;
        return matchesQuery && matchesGestor;
      });

      const list = document.getElementById('client-list');
      const all = State.clients;

      /* ---- Statistics Summary ---- */
      const stats = {
        total: all.length,
        active: all.filter(c => c.status !== 'inactive' && c.platforms?.length > 0).length,
        none: all.filter(c => c.status !== 'inactive' && (!c.platforms || c.platforms.length === 0)).length,
        cancel: all.filter(c => c.status === 'inactive').length
      };

      const statsEl = document.getElementById('stats-summary');
      if (statsEl) {
        statsEl.innerHTML = `
          <div class="stat-item" title="Total de clientes">Total: <span class="stat-val">${stats.total}</span></div>
          <span style="opacity:0.2">|</span>
          <div class="stat-item"><span class="stat-dot active"></span> Ativos: <span class="stat-val">${stats.active}</span></div>
          <div class="stat-item"><span class="stat-dot none"></span> Sem Campanha: <span class="stat-val">${stats.none}</span></div>
          <div class="stat-item"><span class="stat-dot cancel"></span> Cancelamento: <span class="stat-val">${stats.cancel}</span></div>
        `;
      }

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <div class="empty-state-title">${query ? 'Nenhum resultado' : 'Nenhum cliente cadastrado'}</div>
            <p class="empty-state-sub">${query ? 'Tente outro termo de busca.' : 'Preencha o formulário ao lado para começar.'}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(c => renderClientCard(c)).join('');
    }

    function renderClientCard(c) {
      const isInactive = !c.platforms?.length;
      const isCanceled = c.status === 'inactive';

      let statusBadge = '';
      if (isCanceled) statusBadge = '<span class="badge-canceled">🔴 CANCELAMENTO</span>';
      else if (isInactive) statusBadge = '<span class="badge-inactive">🟡 SEM CAMPANHA</span>';
      else statusBadge = '<span class="badge-active">🟢 ATIVO</span>';

      return `
        <div class="client-card ${isCanceled ? 'status-inactive' : (isInactive ? 'inactive-glow' : '')}">
          <div class="client-card-header">
            <div class="client-name-wrap">
              <div class="client-name">${escHtml(c.nome)}</div>
              ${statusBadge}
            </div>
          </div>
          <div class="platforms-display">${(c.platforms || []).map(p => renderPlatformChip(p)).join('')}</div>
          <div class="client-footer">
            <div class="footer-meta">
              <div class="client-meta">
                <span class="badge badge-gestor">🗂 ${escHtml(c.gestor)}</span>
                <span class="badge badge-${c.gestorEstrategico.toLowerCase()}">👤 ${escHtml(c.gestorEstrategico)}</span>
              </div>
              <span style="font-size:.72rem;color:var(--muted);">📅 ${c.createdAt || ''}</span>
            </div>
            <div class="client-actions">
              <button class="btn-icon edit" onclick="openEdit('${c.id}')">✏️ Editar</button>
              <button class="btn-icon delete" onclick="deleteClient('${c.id}')">🗑 Excluir</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderPlatformChip(p) {
      const platInfo = PLATFORMS.find(item => item.key === p.key);
      const icon = platInfo ? platInfo.icon : '🌐';
      const camps = p.campaigns?.length ? p.campaigns.join(', ') : (p.campaign || '');

      return `
        <div class="platform-chip">
          <span class="platform-chip-icon">${icon}</span>
          <span class="platform-chip-name">${escHtml(p.label)}</span>
          ${camps ? `<span class="chip-sep">·</span><span class="platform-chip-campaign">${escHtml(camps)}</span>` : ''}
        </div>
      `;
    }

    /* ---- Escape HTML para evitar XSS ---- */
    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[m]));
    }

    /* ---- Toast notification ---- */
    function showToast(msg, type = '') {
      const tc = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      tc.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity .3s';
        setTimeout(() => toast.remove(), 320);
      }, 3000);
    }

    function seedInitialData() {
      if (!confirm('Deseja importar a lista de clientes fornecida? Clientes com o mesmo nome não serão duplicados.')) return;

      const currentClients = loadClients();
      let addedCount = 0;

      INITIAL_CLIENTS.forEach(initClient => {
        const exists = currentClients.some(c => c.nome.toLowerCase() === initClient.nome.toLowerCase());
        if (!exists) {
          currentClients.push({ ...initClient, id: uid() }); // Novo ID para evitar conflitos
          addedCount++;
        }
      });

      if (addedCount > 0) {
        saveClients(currentClients);
        renderClients();
        showToast(`${addedCount} novos clientes importados!`, 'success');
      } else {
        showToast('Nenhum cliente novo para importar.', 'info');
      }
    }

    /* ---- Event Listeners Dinâmicos para plataformas ---- */
    document.addEventListener('change', (e) => {
      if (e.target.classList.contains('platform-check')) {
        const id = e.target.id;
        const prefix = id.includes('edit-') ? 'edit-' : '';
        const key = id.replace(prefix + 'plat-', '');
        syncPlatformUI(key, prefix);
      }
    });

    /* ---- Initialization & Migration ---- */
    (function init() {
      // 1. Load Data
      Storage.load();

      // 2. Initial UI Sync
      syncManagerUI();
      initPlatformUI();
      renderClients();

      // 3. Auto-seed if empty
      if (State.clients.length === 0) {
        setTimeout(() => {
          if (confirm('Nenhum cliente encontrado. Deseja carregar a lista padrão?')) seedInitialData();
        }, 500);
      }

      // 4. Data Migration (Legacy support)
      const MAP_CMPS = {
        "META MENSAGEM": "Direct Messages (Meta)",
        "META ENGAJAMENTO": "Engagement (Meta)",
        "META CADASTRO": "Lead Generation (Meta)",
        "META FORMULARIO": "Leads Form (Meta)",
        "META WHATSAPP": "WhatsApp Leads",
        "G-ADS RDP": "Search Network (G-Ads)",
        "G-ADS P.MAX": "Performance Max",
        "G-ADS PMAX": "Performance Max",
        "GLS": "Local Service Ads (GLS)"
      };

      let modified = false;
      State.clients.forEach(c => {
        (c.platforms || []).forEach(p => {
          if (MAP_CMPS[p.campaign]) {
            p.campaign = MAP_CMPS[p.campaign];
            modified = true;
          }
        });
      });

      if (modified) {
        Storage.save();
        renderClients();
        console.log("TS Controler: Dados migrados com sucesso.");
      }
    })();
  </script>
